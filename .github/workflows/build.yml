name: Build firmware

# Compiles the sketch exactly like tools/release.sh does, and enforces the
# same static-RAM ceiling. A build that quietly grows past the ceiling leaves
# too little heap for TLS/OTA — see CONTRIBUTING.md for why that's a
# "won't boot its own updater" bug, not a style nitpick.
#
# Only on pull requests and manual runs. Pushes to main come from
# tools/release.sh, which already compiles and enforces the same ceiling
# locally — re-running it here duplicated the work and mailed the maintainer
# on every single release.

on:
  pull_request:
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

env:
  FQBN: esp32:esp32:esp32s3:CDCOnBoot=cdc,PartitionScheme=min_spiffs,PSRAM=enabled
  ESP32_CORE_VERSION: "3.3.10"
  ESP32_INDEX_URL: https://espressif.github.io/arduino-esp32/package_esp32_index.json
  RAM_LIMIT_BYTES: 76000

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install arduino-cli
        uses: arduino/setup-arduino-cli@v1

      - name: Install esp32 core (pinned)
        run: |
          arduino-cli core update-index --additional-urls "$ESP32_INDEX_URL"
          arduino-cli core install "esp32:esp32@${ESP32_CORE_VERSION}" --additional-urls "$ESP32_INDEX_URL"

      # Versions pinned to match the maintainer's known-good local setup.
      # Bump deliberately (and re-check the RAM ceiling) rather than drifting.
      - name: Install libraries (pinned)
        run: |
          arduino-cli lib install \
            "TFT_eSPI@2.5.43" \
            "ArduinoJson@7.4.3" \
            "PNGdec@1.1.6" \
            "PubSubClient@2.8"

      # TFT_eSPI is configured by overwriting its User_Setup.h, not via
      # build flags. tools/release.sh assumes this has already been done
      # once on the maintainer's machine (see README "Wiring" section for
      # the manual step); CI has to do it fresh every run.
      # Deliberately no jq on `lib list --format json`: that output is a dict
      # ({"installed_libraries": [...]}) on arduino-cli 1.5 but a bare array on
      # other versions, so the query broke on CI while working locally. The
      # sketchbook path is stable across versions.
      - name: Drop in this repo's TFT_eSPI User_Setup.h
        run: |
          USER_DIR=$(arduino-cli config get directories.user)
          LIB_DIR="$USER_DIR/libraries/TFT_eSPI"
          test -d "$LIB_DIR" || { echo "::error::TFT_eSPI not found at $LIB_DIR"; exit 1; }
          cp User_Setup.h "$LIB_DIR/User_Setup.h"
          echo "User_Setup.h -> $LIB_DIR"

      # No --build-property here, deliberately. The one compiler flag this
      # project overrides (-fno-exceptions, worth ~95 KB of flash) lives in
      # build_opt.h in the sketch folder; the esp32 core's prebuild hook copies
      # it into the build dir and feeds it to the compiler as a response file.
      # It is checked into the repo, so this checkout gets it automatically and
      # builds the same bytes as tools/release.sh and as a README reader.
      # If a flag ever has to be added to this command, it must be added to
      # tools/release.sh and both READMEs in the same PR — see CONTRIBUTING.md.
      - name: Compile
        run: |
          arduino-cli compile --fqbn "$FQBN" --output-dir build . | tee build.log
          test -f build_opt.h || { echo "::error::build_opt.h is missing — the -fno-exceptions flag it carries is worth ~95 KB of flash and this build is NOT what release.sh produces. See CONTRIBUTING.md."; exit 1; }

      - name: Enforce RAM ceiling (same rule as tools/release.sh)
        run: |
          STATIC=$(grep -oE 'Global variables use [0-9]+' build.log | grep -oE '[0-9]+' || echo 0)
          echo "Static RAM used: ${STATIC} B (ceiling: ${RAM_LIMIT_BYTES} B)"
          if [ "$STATIC" -eq 0 ]; then
            echo "::error::Could not find a 'Global variables use' line in the build output — did the arduino-cli/compiler output format change? Update this check."
            exit 1
          fi
          if [ "$STATIC" -gt "$RAM_LIMIT_BYTES" ]; then
            echo "::error::Static RAM ${STATIC} B exceeds the ${RAM_LIMIT_BYTES} B ceiling — too little heap left for TLS/OTA (see CONTRIBUTING.md)."
            exit 1
          fi

      - name: Collect firmware.bin
        run: |
          BIN=$(ls build/*.ino.bin | head -1)
          cp "$BIN" build/firmware.bin

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware.bin
          path: build/firmware.bin
          if-no-files-found: error
